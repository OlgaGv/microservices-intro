apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources-db
  namespace: k8s-program
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resources-db
  template:
    metadata:
      labels:
        app: resources-db
    spec:
      containers:
        - name: resources-db
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: resources-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: resources-storage
          persistentVolumeClaim:
            claimName: resources-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: resources-db
  namespace: k8s-program
spec:
  selector:
    app: resources-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
