apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-db
  namespace: k8s-program
spec:
  replicas: 1
  selector:
    matchLabels:
      app: songs-db
  template:
    metadata:
      labels:
        app: songs-db
    spec:
      containers:
        - name: songs-db
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: songs-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: songs-storage
          persistentVolumeClaim:
            claimName: songs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: songs-db
  namespace: k8s-program
spec:
  selector:
    app: songs-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
